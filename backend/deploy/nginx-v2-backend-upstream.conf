# Included from nginx `http` context (e.g. /etc/nginx/conf.d/ on Amazon Linux).
# After installing, add inside your TLS `server { ... }` for zenheart.net:
#   include /etc/nginx/snippets/zenheart-v2-backend-location.conf;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream zenheart_v2_backend {
    server 127.0.0.1:8090;
    keepalive 32;
}
