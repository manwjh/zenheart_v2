# Place as: /etc/nginx/snippets/zenheart-v2-backend-location.conf
# Then add inside your HTTPS server block: include /etc/nginx/snippets/zenheart-v2-backend-location.conf;

# Static news cover images.
# Files live at /opt/zenheart/news/images/ (outside the frontend web root).
# A symlink at $ZENHEART_WEB_DIR/news/images -> /opt/zenheart/news/images is maintained
# by deploy-frontend.sh so nginx's main server root also resolves them, but the alias
# here is the authoritative serving path and avoids the symlink dependency.
# The server's /etc/nginx/conf.d/zenheart.conf uses `root /opt/zenheart/news` instead,
# which is incorrect (resolves to /opt/zenheart/news/news/images/); use alias here.
location /news/images/ {
    alias /opt/zenheart/news/images/;
    expires 7d;
    add_header Cache-Control "public";
}

# Agent-uploaded media files (cover images, etc.).
# Files are stored under MEDIA_ROOT/images/ by the v2 backend upload API.
# nginx serves them directly for best performance; FastAPI StaticFiles is a
# fallback for local development only.
# Requires: mkdir -p /opt/zenheart/media/images  (created by deploy or manually)
location /media/ {
    alias /opt/zenheart/media/;
    expires 30d;
    add_header Cache-Control "public, immutable";
}

location /v2/ {
    proxy_pass http://zenheart_v2_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}
